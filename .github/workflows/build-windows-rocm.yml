name: Build Windows ROCm

permissions:
  contents: read

on:
  push:
    branches: [main, master]

jobs:
  build-windows-rocm:
    runs-on: [self-hosted, windows, rocm]
    env:
      TARGET_TRIPLET: x86_64-pc-windows-msvc
      NLLB_SOURCE_REPO: https://github.com/AstonWilliams/Metal-CoreMLwhisper.cpp-build.git
      SPEAKSHIFT_LICENSE_PUBLIC_KEY_B64: c8jYXlpk8bFV5WggseDoLgg5Q0Ujf/+vTp+kMnzeiic=

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        shell: pwsh
        run: rustup target add $env:TARGET_TRIPLET

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> src-tauri/target

      - name: Verify HIP/ROCm toolchain on runner
        shell: pwsh
        run: |
          hipcc --version
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          New-Item -ItemType Directory -Force -Path src-tauri/binaries/whisper | Out-Null

      - name: Configure Windows build environment
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $vcvars = $null
          if (Test-Path $vswhere) {
            $vcvars = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -find 'VC\Auxiliary\Build\vcvars64.bat' | Select-Object -First 1
          }
          if (-not $vcvars) {
            $fallbacks = @(
              'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat',
              'C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat',
              'C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat',
              'C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build\vcvars64.bat',
              'C:\Program Files (x86)\Microsoft Visual Studio\2019\Community\VC\Auxiliary\Build\vcvars64.bat',
              'C:\Program Files (x86)\Microsoft Visual Studio\2019\Professional\VC\Auxiliary\Build\vcvars64.bat'
            )
            $vcvars = $fallbacks | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $vcvars) {
            throw 'vcvars64.bat not found on runner'
          }
          "VCVARS_BAT=$vcvars" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          $staticCrtFlag = '-C target-feature=+crt-static'
          if ([string]::IsNullOrWhiteSpace($env:RUSTFLAGS)) {
            "RUSTFLAGS=$staticCrtFlag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            "RUSTFLAGS=$env:RUSTFLAGS $staticCrtFlag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: Download ffmpeg sidecar
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-unpack
          $ff = Get-ChildItem -Recurse ffmpeg-unpack -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $ff.FullName "src-tauri/binaries/ffmpeg-$env:TARGET_TRIPLET.exe"

      - name: Build whisper.cpp sidecar (HIPBLAS)
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git whisper-src
          cmd.exe /d /s /c "call \"$env:VCVARS_BAT\" && cmake -S whisper-src -B whisper-src/build -DCMAKE_BUILD_TYPE=Release -DGGML_HIPBLAS=ON -DGGML_NATIVE=OFF"
          if ($LASTEXITCODE -ne 0) { throw 'CMake configure failed for whisper.cpp HIPBLAS build' }
          cmd.exe /d /s /c "call \"$env:VCVARS_BAT\" && cmake --build whisper-src/build --target whisper-cli --config Release"
          if ($LASTEXITCODE -ne 0) { throw 'CMake build failed for whisper.cpp HIPBLAS build' }
          $whisperCli = Get-ChildItem -Recurse whisper-src/build -Filter whisper-cli.exe | Select-Object -First 1
          if (-not $whisperCli) { throw "whisper-cli.exe not found in whisper build output" }
          Copy-Item $whisperCli.FullName "src-tauri/binaries/whisper/whisper-cli-$env:TARGET_TRIPLET.exe"
          $dllRoot = Split-Path -Parent $whisperCli.FullName
          Get-ChildItem "$dllRoot/*.dll" -ErrorAction SilentlyContinue | ForEach-Object { Copy-Item $_.FullName src-tauri/binaries/whisper/ }

      - name: Build nllb-translation sidecar
        shell: pwsh
        run: |
          git clone --depth 1 "$env:NLLB_SOURCE_REPO" nllb-src
          Push-Location nllb-src/nllb_build
          cmd.exe /d /s /c "call \"$env:VCVARS_BAT\" && cargo build --release"
          if ($LASTEXITCODE -ne 0) { throw 'NLLB cargo build failed' }
          Pop-Location
          $nllbBin = Get-ChildItem -Recurse -Path nllb-src -Filter *.exe | Where-Object { $_.FullName -match "target[\\/]release" -and $_.Name -like "nllb*" } | Select-Object -First 1
          if (-not $nllbBin) {
            Write-Host "Could not find NLLB release binary under any nllb-src/**/target/release path"
            Get-ChildItem -Recurse -Directory nllb-src | Where-Object { $_.FullName -match "target[\\/]release$" } | Select-Object -ExpandProperty FullName
            throw "NLLB binary not found"
          }
          Copy-Item $nllbBin.FullName "src-tauri/binaries/nllb-translation-$env:TARGET_TRIPLET.exe"

      - name: Download yt-dlp sidecar
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "src-tauri/binaries/yt-dlp-$env:TARGET_TRIPLET.exe"

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        shell: cmd
        run: call "%VCVARS_BAT%" && npm run tauri build -- --config src-tauri/tauri.windows.conf.json --target %TARGET_TRIPLET%

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: speakshift-windows-rocm
          path: |
            src-tauri/binaries/**
            src-tauri/target/${{ env.TARGET_TRIPLET }}/release/bundle/**
          if-no-files-found: warn
