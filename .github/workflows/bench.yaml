name: Benchmark Sidecar Performance

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag in AstonWilliams/SpeakShift2 (leave empty for latest)"
        required: false
        default: ""
      bench_audio_tag:
        description: "Release tag that contains benchmark audio assets"
        required: false
        default: "bench_audio"
      bench_audio_asset:
        description: "Optional exact benchmark audio asset name in bench_audio_tag"
        required: false
        default: ""
      words_per_hour:
        description: "Estimated transcript word count for 1 hour audio"
        required: false
        default: "12000"
      translation_repeats:
        description: "Measured repeats per NLLB variant before extrapolation"
        required: false
        default: "5"
      nllb_variants:
        description: "Comma-separated NLLB variants"
        required: false
        default: "nllb_int8_float16,nllb_float16,nllb_int8_float32,nllb_float32"

env:
  RELEASE_REPO: AstonWilliams/SpeakShift2
  HF_NLLB_REPO: Aaron294/NLLB-CT2RS-COMPAT
  HF_WHISPER_BASE_URL: https://huggingface.co/ggerganov/whisper.cpp/resolve/main

jobs:
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            bench_id: windows
            platform_hint: windows
          - os: macos-14
            bench_id: macos
            platform_hint: macos

    runs-on: ${{ matrix.os }}
    timeout-minutes: 420

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare benchmark directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bench/downloads | Out-Null
          New-Item -ItemType Directory -Force -Path bench/extracted | Out-Null
          New-Item -ItemType Directory -Force -Path bench/models/whisper | Out-Null
          New-Item -ItemType Directory -Force -Path bench/models/nllb | Out-Null
          New-Item -ItemType Directory -Force -Path bench/work | Out-Null
          New-Item -ItemType Directory -Force -Path bench/results | Out-Null

      - name: Download platform binaries from GitHub releases
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          PLATFORM_HINT: ${{ matrix.platform_hint }}
        run: |
          $script = @'
import json
import os
import pathlib
import re
import sys
import urllib.parse
import urllib.request

repo = os.environ["RELEASE_REPO"]
tag = (os.environ.get("RELEASE_TAG") or "").strip()
platform_hint = os.environ["PLATFORM_HINT"].lower()

if tag:
    api = f"https://api.github.com/repos/{repo}/releases/tags/{urllib.parse.quote(tag)}"
else:
    api = f"https://api.github.com/repos/{repo}/releases/latest"

headers = {
    "Accept": "application/vnd.github+json",
    "User-Agent": "speakshift-benchmark-workflow",
}
token = os.environ.get("GH_TOKEN")
if token:
    headers["Authorization"] = f"Bearer {token}"

req = urllib.request.Request(api, headers=headers)
with urllib.request.urlopen(req) as resp:
    release = json.loads(resp.read().decode("utf-8"))

assets = release.get("assets", [])
if not assets:
    raise SystemExit("No assets found in selected release")

platform_keywords = {
    "windows": ["windows", "win", "x86_64-pc-windows-msvc"],
    "macos": ["macos", "darwin", "apple", "aarch64-apple-darwin"],
}
bin_keywords = ["whisper", "nllb", "ffmpeg", "binaries", "sidecar", "speakshift"]

selected = []
keys = platform_keywords[platform_hint]
for a in assets:
    name = (a.get("name") or "").lower()
    if not any(k in name for k in keys):
        continue
    if not any(k in name for k in bin_keywords):
        continue
    selected.append(a)

# Fallback: if strict filtering misses packaged assets, include all platform-matching archives.
if not selected:
    for a in assets:
        name = (a.get("name") or "").lower()
        if any(k in name for k in keys) and any(name.endswith(ext) for ext in (".zip", ".tar.gz", ".tgz", ".exe", ".bin")):
            selected.append(a)

if not selected:
    names = "\n".join(sorted((a.get("name") or "") for a in assets))
    raise SystemExit(f"No assets selected for platform={platform_hint}. Available assets:\n{names}")

out_dir = pathlib.Path("bench/downloads")
out_dir.mkdir(parents=True, exist_ok=True)

manifest = {
    "release": {
        "id": release.get("id"),
        "tag_name": release.get("tag_name"),
        "name": release.get("name"),
        "html_url": release.get("html_url"),
    },
    "platform": platform_hint,
    "selected_assets": [],
}

for a in selected:
    url = a.get("browser_download_url")
    name = a.get("name")
    if not url or not name:
        continue

    target = out_dir / name
    print(f"Downloading: {name}")
    req = urllib.request.Request(url, headers={"User-Agent": "speakshift-benchmark-workflow"})
    with urllib.request.urlopen(req) as resp, open(target, "wb") as f:
        f.write(resp.read())

    manifest["selected_assets"].append({
        "name": name,
        "size": a.get("size"),
        "download_url": url,
        "path": str(target),
    })

with open(out_dir / "assets_manifest.json", "w", encoding="utf-8") as f:
    json.dump(manifest, f, indent=2)

print(f"Downloaded {len(manifest['selected_assets'])} assets for {platform_hint}")
'@

          $tempPy = "bench/download_binaries.py"
          $script | Out-File -FilePath $tempPy -Encoding utf8 -Force
          python $tempPy
          Remove-Item $tempPy -Force -ErrorAction SilentlyContinue

      - name: Extract downloaded assets
        shell: pwsh
        run: |
          $script = @'
import pathlib
import shutil
import tarfile
import zipfile

src = pathlib.Path("bench/downloads")
dst = pathlib.Path("bench/extracted")
dst.mkdir(parents=True, exist_ok=True)

for p in src.iterdir():
    if p.name == "assets_manifest.json":
        continue
    if p.is_dir():
        continue

    target_dir = dst / p.stem
    target_dir.mkdir(parents=True, exist_ok=True)

    name = p.name.lower()
    if name.endswith(".zip"):
        with zipfile.ZipFile(p, "r") as zf:
            zf.extractall(target_dir)
    elif name.endswith(".tar.gz") or name.endswith(".tgz"):
        with tarfile.open(p, "r:gz") as tf:
            tf.extractall(target_dir)
    else:
        shutil.copy2(p, target_dir / p.name)

print("Extraction complete")
'@

          $tempPy = "bench/extract_assets.py"
          $script | Out-File -FilePath $tempPy -Encoding utf8 -Force
          python $tempPy
          Remove-Item $tempPy -Force -ErrorAction SilentlyContinue

      - name: Resolve whisper, nllb, and ffmpeg binaries
        shell: pwsh
        env:
          PLATFORM_HINT: ${{ matrix.platform_hint }}
        run: |
          $script = @'
import fnmatch
import os
import pathlib
import stat
import sys

root = pathlib.Path("bench/extracted")
platform_hint = os.environ["PLATFORM_HINT"].lower()
is_windows = platform_hint == "windows"

required_patterns = {
    "WHISPER_BIN": ["whisper-cli*.exe", "whisper*.exe"] if is_windows else ["whisper-cli*", "whisper*"],
    "NLLB_BIN": ["nllb-translation*.exe", "nllb*.exe"] if is_windows else ["nllb-translation*", "nllb*"],
}
optional_patterns = {
    "FFMPEG_BIN": ["ffmpeg*.exe"] if is_windows else ["ffmpeg*"],
}

def find_best(globs):
    candidates = []
    for p in root.rglob("*"):
        if not p.is_file():
            continue
        name = p.name.lower()
        for g in globs:
            if fnmatch.fnmatch(name, g.lower()):
                candidates.append(p)
                break

    if not candidates:
        return None

    # Prefer shortest path and explicit binary names.
    candidates.sort(key=lambda x: (len(str(x)), str(x).lower()))
    return candidates[0]

resolved = {}
for env_name, globs in required_patterns.items():
    found = find_best(globs)
    if not found:
        raise SystemExit(f"Could not resolve {env_name} under {root}")

    if not is_windows:
        mode = found.stat().st_mode
        found.chmod(mode | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)

    resolved[env_name] = str(found.resolve())

for env_name, globs in optional_patterns.items():
    found = find_best(globs)
    if not found:
        print(f"Optional binary not found: {env_name}")
        continue

    if not is_windows:
        mode = found.stat().st_mode
        found.chmod(mode | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)

    resolved[env_name] = str(found.resolve())

with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
    for k, v in resolved.items():
        f.write(f"{k}={v}\n")

print("Resolved binaries:")
for k, v in resolved.items():
    print(f"  {k} -> {v}")
'@

          $tempPy = "bench/resolve_binaries.py"
          $script | Out-File -FilePath $tempPy -Encoding utf8 -Force
          python $tempPy
          Remove-Item $tempPy -Force -ErrorAction SilentlyContinue

      - name: Download Whisper base and large models
        shell: pwsh
        run: |
          $script = @'
import os
import pathlib
import urllib.request

base_url = os.environ["HF_WHISPER_BASE_URL"].rstrip("/")
out = pathlib.Path("bench/models/whisper")
out.mkdir(parents=True, exist_ok=True)

models = ["ggml-base.bin", "ggml-large-v3.bin"]
for m in models:
    target = out / m
    if target.exists() and target.stat().st_size > 1_000_000:
        print(f"Model already present: {m}")
        continue

    url = f"{base_url}/{m}"
    print(f"Downloading {url}")
    req = urllib.request.Request(url, headers={"User-Agent": "speakshift-benchmark-workflow"})
    with urllib.request.urlopen(req) as resp, open(target, "wb") as f:
        f.write(resp.read())

print("Whisper models ready")
'@

          $tempPy = "bench/download_whisper.py"
          $script | Out-File -FilePath $tempPy -Encoding utf8 -Force
          python $tempPy
          Remove-Item $tempPy -Force -ErrorAction SilentlyContinue

      - name: Download benchmark audio from release tag
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BENCH_AUDIO_TAG: ${{ github.event.inputs.bench_audio_tag }}
          BENCH_AUDIO_ASSET: ${{ github.event.inputs.bench_audio_asset }}
        run: |
          $script = @'
import json
import os
import pathlib
import subprocess
import urllib.parse
import urllib.request

repo = os.environ["RELEASE_REPO"]
tag = (os.environ.get("BENCH_AUDIO_TAG") or "bench_audio").strip()
wanted_asset = (os.environ.get("BENCH_AUDIO_ASSET") or "").strip()

api = f"https://api.github.com/repos/{repo}/releases/tags/{urllib.parse.quote(tag)}"
headers = {
    "Accept": "application/vnd.github+json",
    "User-Agent": "speakshift-benchmark-workflow",
}
token = os.environ.get("GH_TOKEN")
if token:
    headers["Authorization"] = f"Bearer {token}"

req = urllib.request.Request(api, headers=headers)
with urllib.request.urlopen(req) as resp:
    release = json.loads(resp.read().decode("utf-8"))

audio_exts = (".wav", ".mp3", ".m4a", ".flac", ".ogg", ".opus", ".aac", ".mp4", ".mkv", ".webm", ".mov")
assets = release.get("assets", [])

candidates = []
for a in assets:
    name = (a.get("name") or "")
    lower = name.lower()
    if lower.endswith(audio_exts):
        candidates.append(a)

if wanted_asset:
    selected = next((a for a in candidates if (a.get("name") or "") == wanted_asset), None)
    if not selected:
        available = "\n".join(sorted((a.get("name") or "") for a in candidates))
        raise SystemExit(f"Requested bench_audio_asset not found: {wanted_asset}\nAvailable audio assets:\n{available}")
else:
    # Prefer names that explicitly look like benchmark content, then larger assets.
    def sort_key(a):
        name = (a.get("name") or "").lower()
        score = 0
        if "bench" in name:
            score -= 10
        if "1h" in name or "1hr" in name or "60min" in name:
            score -= 8
        if "audio" in name:
            score -= 5
        size = int(a.get("size") or 0)
        return (score, -size, name)

    if not candidates:
        all_names = "\n".join(sorted((a.get("name") or "") for a in assets))
        raise SystemExit(f"No audio assets found in release tag '{tag}'. Assets:\n{all_names}")
    selected = sorted(candidates, key=sort_key)[0]

out_dir = pathlib.Path("bench/work")
out_dir.mkdir(parents=True, exist_ok=True)

name = selected.get("name")
url = selected.get("browser_download_url")
if not name or not url:
    raise SystemExit("Selected bench audio asset is missing required fields")

downloaded = out_dir / name
print(f"Downloading benchmark audio asset: {name}")
req = urllib.request.Request(url, headers={"User-Agent": "speakshift-benchmark-workflow"})
with urllib.request.urlopen(req) as resp, open(downloaded, "wb") as f:
    f.write(resp.read())

final_path = downloaded
if downloaded.suffix.lower() != ".wav":
    ffmpeg = os.environ.get("FFMPEG_BIN")
    if not ffmpeg:
        raise SystemExit(f"Benchmark audio is not WAV ({downloaded.name}) and FFMPEG_BIN is unavailable for conversion")

    wav_target = out_dir / "bench_input.wav"
    cmd = [
        ffmpeg,
        "-hide_banner",
        "-loglevel",
        "error",
        "-y",
        "-i",
        str(downloaded),
        "-ac",
        "1",
        "-ar",
        "16000",
        "-c:a",
        "pcm_s16le",
        str(wav_target),
    ]
    print("Converting benchmark audio to 16k mono WAV")
    subprocess.run(cmd, check=True)
    final_path = wav_target

with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
    f.write(f"BENCH_AUDIO_PATH={str(final_path.resolve())}\n")
    f.write(f"BENCH_AUDIO_ASSET_NAME={name}\n")
    f.write(f"BENCH_AUDIO_TAG={tag}\n")

print(f"Benchmark audio ready: {final_path}")
'@

          $tempPy = "bench/download_audio.py"
          $script | Out-File -FilePath $tempPy -Encoding utf8 -Force
          python $tempPy
          Remove-Item $tempPy -Force -ErrorAction SilentlyContinue

      - name: Benchmark transcription (Whisper base and large)
        shell: pwsh
        run: |
          $models = @(
            @{ Name = "base"; Path = "bench/models/whisper/ggml-base.bin" },
            @{ Name = "large-v3"; Path = "bench/models/whisper/ggml-large-v3.bin" }
          )

          $rows = @()
          foreach ($m in $models) {
            if (!(Test-Path $m.Path)) {
              throw "Model missing: $($m.Path)"
            }

            $sw = [System.Diagnostics.Stopwatch]::StartNew()
            & "$env:WHISPER_BIN" -m $m.Path -f "$env:BENCH_AUDIO_PATH" --language en --output-json | Out-Null
            $code = $LASTEXITCODE
            $sw.Stop()

            if ($code -ne 0) {
              throw "Whisper benchmark failed for $($m.Name) with exit code $code"
            }

            $sec = [Math]::Round($sw.Elapsed.TotalSeconds, 2)
            $rows += [pscustomobject]@{
              model = $m.Name
              elapsed_seconds = $sec
              elapsed_minutes = [Math]::Round($sec / 60.0, 2)
            }
          }

          $rows | ConvertTo-Json -Depth 5 | Out-File -FilePath "bench/results/transcription_${{ matrix.bench_id }}.json" -Encoding utf8

      - name: Download requested NLLB variants from Hugging Face
        shell: pwsh
        env:
          NLLB_VARIANTS: ${{ github.event.inputs.nllb_variants }}
        run: |
          $script = @'
import json
import os
import pathlib
import urllib.parse
import urllib.request

repo = os.environ["HF_NLLB_REPO"]
requested = [v.strip() for v in (os.environ.get("NLLB_VARIANTS") or "").split(",") if v.strip()]
if not requested:
    raise SystemExit("No NLLB variants requested")

api = f"https://huggingface.co/api/models/{repo}"
req = urllib.request.Request(api, headers={"User-Agent": "speakshift-benchmark-workflow"})
with urllib.request.urlopen(req) as resp:
    meta = json.loads(resp.read().decode("utf-8"))

siblings = [s.get("rfilename", "") for s in meta.get("siblings", []) if s.get("rfilename")]
out_root = pathlib.Path("bench/models/nllb")
out_root.mkdir(parents=True, exist_ok=True)

available = []
for variant in requested:
    variant_files = [f for f in siblings if f.startswith(f"{variant}/") and not f.endswith("/")]
    if not variant_files:
        print(f"Variant not found in repo, skipping: {variant}")
        continue

    variant_root = out_root / variant
    variant_root.mkdir(parents=True, exist_ok=True)

    for rel in variant_files:
        rel_after = rel[len(variant) + 1 :]
        target = variant_root / rel_after
        target.parent.mkdir(parents=True, exist_ok=True)

        if target.exists() and target.stat().st_size > 100:
            continue

        url = f"https://huggingface.co/{repo}/resolve/main/{urllib.parse.quote(rel)}?download=true"
        print(f"Downloading {variant}: {rel_after}")
        req = urllib.request.Request(url, headers={"User-Agent": "speakshift-benchmark-workflow"})
        with urllib.request.urlopen(req) as resp, open(target, "wb") as f:
            f.write(resp.read())

    if (variant_root / "model.bin").exists() and (variant_root / "tokenizer.json").exists():
        available.append(variant)
    else:
        print(f"Variant missing model.bin/tokenizer.json after download: {variant}")

work_dir = pathlib.Path("bench/work")
work_dir.mkdir(parents=True, exist_ok=True)
(work_dir / "nllb_available.txt").write_text("\n".join(available), encoding="utf-8")

print(f"Available variants: {available}")
'@

          $tempPy = "bench/download_nllb.py"
          $script | Out-File -FilePath $tempPy -Encoding utf8 -Force
          python $tempPy
          Remove-Item $tempPy -Force -ErrorAction SilentlyContinue

      - name: Benchmark translation (NLLB variants)
        shell: pwsh
        env:
          TRANSLATION_REPEATS: ${{ github.event.inputs.translation_repeats }}
          WORDS_PER_HOUR: ${{ github.event.inputs.words_per_hour }}
        run: |
          $availableFile = "bench/work/nllb_available.txt"
          if (!(Test-Path $availableFile)) {
            throw "Missing nllb_available.txt"
          }

          $variants = Get-Content -Path $availableFile | Where-Object { $_.Trim().Length -gt 0 }
          if ($variants.Count -eq 0) {
            throw "No NLLB variants available to benchmark"
          }

          $repeats = [int]$env:TRANSLATION_REPEATS
          if ($repeats -lt 1) { throw "translation_repeats must be >= 1" }

          $wordsPerHour = [double]$env:WORDS_PER_HOUR
          if ($wordsPerHour -le 0) { throw "words_per_hour must be > 0" }

          $chunkWords = 120
          $wordPool = @(
            "speakshift","processes","audio","locally","without","uploads","for","privacy",
            "transcription","translation","workflow","subtitle","segments","speaker","timeline",
            "editing","export","quality","performance","benchmark","model","runtime"
          )

          $chunk = [System.Collections.Generic.List[string]]::new()
          while ($chunk.Count -lt $chunkWords) {
            foreach ($w in $wordPool) {
              if ($chunk.Count -ge $chunkWords) { break }
              $chunk.Add($w)
            }
          }
          $text = ($chunk -join " ")

          $rows = @()
          foreach ($variant in $variants) {
            $modelDir = Join-Path "bench/models/nllb" $variant
            if (!(Test-Path (Join-Path $modelDir "model.bin"))) {
              Write-Host "Skipping $variant (model.bin missing)"
              continue
            }

            # Warmup
            & "$env:NLLB_BIN" --model-dir "$modelDir" --text "$text" --source-lang "eng_Latn" --target-lang "spa_Latn" --beam 4 --max-tokens 300 | Out-Null
            if ($LASTEXITCODE -ne 0) {
              throw "Warmup failed for variant $variant"
            }

            $total = 0.0
            for ($i = 1; $i -le $repeats; $i++) {
              $sw = [System.Diagnostics.Stopwatch]::StartNew()
              & "$env:NLLB_BIN" --model-dir "$modelDir" --text "$text" --source-lang "eng_Latn" --target-lang "spa_Latn" --beam 4 --max-tokens 300 | Out-Null
              $code = $LASTEXITCODE
              $sw.Stop()

              if ($code -ne 0) {
                throw "Translation run failed for variant $variant (repeat $i)"
              }

              $total += $sw.Elapsed.TotalSeconds
            }

            $avg = $total / $repeats
            $estimatedSeconds = $avg * ($wordsPerHour / $chunkWords)

            $rows += [pscustomobject]@{
              variant = $variant
              avg_seconds_per_chunk = [Math]::Round($avg, 3)
              estimated_seconds_for_1h_audio = [Math]::Round($estimatedSeconds, 2)
              estimated_minutes_for_1h_audio = [Math]::Round($estimatedSeconds / 60.0, 2)
            }
          }

          if ($rows.Count -eq 0) {
            throw "No translation benchmark rows produced"
          }

          $rows | ConvertTo-Json -Depth 5 | Out-File -FilePath "bench/results/translation_${{ matrix.bench_id }}.json" -Encoding utf8

      - name: Build benchmark report file
        shell: pwsh
        env:
          WORDS_PER_HOUR: ${{ github.event.inputs.words_per_hour }}
          TRANSLATION_REPEATS: ${{ github.event.inputs.translation_repeats }}
        run: |
          $transcription = Get-Content "bench/results/transcription_${{ matrix.bench_id }}.json" -Raw | ConvertFrom-Json
          $translation = Get-Content "bench/results/translation_${{ matrix.bench_id }}.json" -Raw | ConvertFrom-Json

          $platform = "${{ matrix.bench_id }}"
          $out = "bench/results/benchmark_${{ matrix.bench_id }}.md"

          $lines = @()
          $lines += "# SpeakShift Benchmark Report ($platform)"
          $lines += ""
          $lines += "- Platform: $platform"
          $lines += "- Benchmark audio release tag: $($env:BENCH_AUDIO_TAG)"
          $lines += "- Benchmark audio asset: $($env:BENCH_AUDIO_ASSET_NAME)"
          $lines += "- Translation estimation target: $($env:WORDS_PER_HOUR) words (~1 hour transcript)"
          $lines += "- Translation measured repeats per variant: $($env:TRANSLATION_REPEATS)"
          $lines += ""
          $lines += "## Transcription (Whisper)"
          $lines += ""
          $lines += "| Model | Elapsed seconds | Elapsed minutes |"
          $lines += "|---|---:|---:|"
          foreach ($row in $transcription) {
            $lines += "| $($row.model) | $($row.elapsed_seconds) | $($row.elapsed_minutes) |"
          }

          $lines += ""
          $lines += "## Translation (NLLB variants, estimated for 1h transcript)"
          $lines += ""
          $lines += "| Variant | Avg sec/chunk | Estimated sec (1h) | Estimated min (1h) |"
          $lines += "|---|---:|---:|---:|"
          foreach ($row in $translation) {
            $lines += "| $($row.variant) | $($row.avg_seconds_per_chunk) | $($row.estimated_seconds_for_1h_audio) | $($row.estimated_minutes_for_1h_audio) |"
          }

          $lines += ""
          $lines += "## Notes"
          $lines += ""
          $lines += "- Transcription timing is measured on the full generated audio duration."
          $lines += "- Translation timing is measured on repeated fixed-size chunks and extrapolated to 1-hour transcript word count."

          $content = $lines -join "`n"
          Set-Content -Path $out -Value $content -Encoding utf8

          $summary = @()
          $summary += "## SpeakShift benchmark ($platform)"
          $summary += ""
          $summary += "Report artifact: benchmark_${{ matrix.bench_id }}.md"
          $summary += ""
          $summary += ($lines | Select-Object -Skip 8)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ($summary -join "`n")

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.bench_id }}
          path: |
