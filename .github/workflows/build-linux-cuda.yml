name: Build Linux CUDA

permissions:
  contents: read

on:
  push:
    branches: [main, master]

jobs:
  build-linux-cuda:
    runs-on: [self-hosted, linux, cuda]
    env:
      TARGET_TRIPLET: x86_64-unknown-linux-gnu
      NLLB_SOURCE_REPO: https://github.com/AstonWilliams/Metal-CoreMLwhisper.cpp-build.git
      SPEAKSHIFT_LICENSE_PUBLIC_KEY_B64: c8jYXlpk8bFV5WggseDoLgg5Q0Ujf/+vTp+kMnzeiic=

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add ${TARGET_TRIPLET}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config git curl zip unzip \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            libjavascriptcoregtk-4.1-dev librsvg2-dev libssl-dev patchelf \
            yasm nasm autoconf automake libtool

      - name: Ensure binaries folders
        run: |
          mkdir -p src-tauri/binaries
          mkdir -p src-tauri/binaries/whisper

      - name: Determine CUDA architectures for whisper
        run: |
          set -euo pipefail

          if ! command -v nvcc >/dev/null 2>&1; then
            echo "::error::nvcc was not found on PATH. CUDA toolkit must be installed on this self-hosted runner."
            exit 1
          fi

          NVCC_VERSION_RAW="$(nvcc --version | sed -n 's/.*release \([0-9]\+\)\.\([0-9]\+\).*/\1 \2/p' | head -n1)"
          if [ -z "${NVCC_VERSION_RAW}" ]; then
            echo "::error::Failed to parse CUDA version from nvcc --version"
            nvcc --version || true
            exit 1
          fi

          CUDA_MAJOR="$(echo "${NVCC_VERSION_RAW}" | awk '{print $1}')"
          CUDA_MINOR="$(echo "${NVCC_VERSION_RAW}" | awk '{print $2}')"

          if [ "${CUDA_MAJOR}" -lt 12 ] || { [ "${CUDA_MAJOR}" -eq 12 ] && [ "${CUDA_MINOR}" -lt 8 ]; }; then
            echo "::error::CUDA ${CUDA_MAJOR}.${CUDA_MINOR} is too old. CUDA >= 12.8 is required for modern RTX 50+ coverage."
            exit 1
          fi

          # 30-series -> 86, 40-series -> 89, 50-series -> 120a/121a.
          # Add 130 virtual when available for better future forward compatibility.
          WHISPER_CUDA_ARCHS="86-real;89-real;90-virtual;120a-real"
          if [ "${CUDA_MAJOR}" -gt 12 ] || { [ "${CUDA_MAJOR}" -eq 12 ] && [ "${CUDA_MINOR}" -ge 9 ]; }; then
            WHISPER_CUDA_ARCHS="${WHISPER_CUDA_ARCHS};121a-real"
          fi
          if [ "${CUDA_MAJOR}" -ge 13 ]; then
            WHISPER_CUDA_ARCHS="${WHISPER_CUDA_ARCHS};130-virtual"
          fi

          echo "WHISPER_CUDA_ARCHS=${WHISPER_CUDA_ARCHS}" >> "${GITHUB_ENV}"
          echo "Using whisper CUDA architectures: ${WHISPER_CUDA_ARCHS}"

      - name: Build ffmpeg sidecar
        run: |
          git clone --depth 1 https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          ./configure --prefix="$PWD/../ffmpeg-install" --disable-debug --enable-gpl --enable-version3 --enable-nonfree --disable-shared --enable-static
          make -j"$(nproc)"
          make install
          cd ..
          cp ffmpeg-install/bin/ffmpeg src-tauri/binaries/ffmpeg-${TARGET_TRIPLET}
          chmod +x src-tauri/binaries/ffmpeg-${TARGET_TRIPLET}

      - name: Build whisper.cpp sidecar (CUDA)
        run: |
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git whisper-src
          cmake -S whisper-src -B whisper-src/build -DCMAKE_BUILD_TYPE=Release -DGGML_CUDA=ON -DGGML_NATIVE=OFF -DCMAKE_CUDA_ARCHITECTURES="${WHISPER_CUDA_ARCHS}"
          cmake --build whisper-src/build --config Release -j"$(nproc)"
          cp whisper-src/build/bin/whisper-cli src-tauri/binaries/whisper/whisper-cli-${TARGET_TRIPLET}
          chmod +x src-tauri/binaries/whisper/whisper-cli-${TARGET_TRIPLET}

      - name: Build nllb-translation sidecar
        run: |
          git clone --depth 1 "$NLLB_SOURCE_REPO" nllb-src
          cd nllb-src/nllb_build
          cargo build --release
          cd ..
          cd ..
          NLLB_BIN="$(find nllb-src -type f \( -path '*/target/release/nllb-translation' -o -path '*/target/release/nllb*' \) | head -n 1)"
          if [ -z "$NLLB_BIN" ]; then
            echo "Could not find NLLB release binary under any nllb-src/**/target/release path"
            find nllb-src -maxdepth 5 -type d -name release -path '*/target/release' -print || true
            exit 1
          fi
          cp "$NLLB_BIN" src-tauri/binaries/nllb-translation-${TARGET_TRIPLET}
          chmod +x src-tauri/binaries/nllb-translation-${TARGET_TRIPLET}

      - name: Download yt-dlp sidecar
        run: |
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o src-tauri/binaries/yt-dlp-${TARGET_TRIPLET}
          chmod +x src-tauri/binaries/yt-dlp-${TARGET_TRIPLET}

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --config src-tauri/tauri.linux.conf.json --target ${TARGET_TRIPLET}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: speakshift-linux-cuda
          path: |
            src-tauri/binaries/**
            src-tauri/target/${{ env.TARGET_TRIPLET }}/release/bundle/**
          if-no-files-found: warn
