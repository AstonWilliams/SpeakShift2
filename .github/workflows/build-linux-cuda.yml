name: Build Linux CUDA

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-linux-cuda:
    runs-on: [self-hosted, linux, cuda]
    env:
      TARGET_TRIPLET: x86_64-unknown-linux-gnu
      NLLB_SOURCE_REPO: https://github.com/AstonWilliams/Metal-CoreMLwhisper.cpp-build.git

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add ${TARGET_TRIPLET}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config git curl zip unzip \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            libjavascriptcoregtk-4.1-dev librsvg2-dev libssl-dev patchelf \
            yasm nasm autoconf automake libtool

      - name: Ensure binaries folders
        run: |
          mkdir -p src-tauri/binaries
          mkdir -p src-tauri/binaries/whisper

      - name: Build ffmpeg sidecar
        run: |
          git clone --depth 1 https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          ./configure --prefix="$PWD/../ffmpeg-install" --disable-debug --enable-gpl --enable-version3 --enable-nonfree --disable-shared --enable-static
          make -j"$(nproc)"
          make install
          cd ..
          cp ffmpeg-install/bin/ffmpeg src-tauri/binaries/ffmpeg-${TARGET_TRIPLET}
          chmod +x src-tauri/binaries/ffmpeg-${TARGET_TRIPLET}

      - name: Build whisper.cpp sidecar (CUDA)
        run: |
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git whisper-src
          cmake -S whisper-src -B whisper-src/build -DCMAKE_BUILD_TYPE=Release -DGGML_CUDA=ON
          cmake --build whisper-src/build --config Release -j"$(nproc)"
          cp whisper-src/build/bin/whisper-cli src-tauri/binaries/whisper/whisper-cli-${TARGET_TRIPLET}
          chmod +x src-tauri/binaries/whisper/whisper-cli-${TARGET_TRIPLET}

      - name: Build nllb-translation sidecar
        run: |
          git clone --depth 1 "$NLLB_SOURCE_REPO" nllb-src
          cd nllb-src/nllb_build
          cargo build --release
          cd ..
          cd ..
          NLLB_BIN="$(find nllb-src -type f \( -path '*/target/release/nllb-translation' -o -path '*/target/release/nllb*' \) | head -n 1)"
          if [ -z "$NLLB_BIN" ]; then
            echo "Could not find NLLB release binary under any nllb-src/**/target/release path"
            find nllb-src -maxdepth 5 -type d -name release -path '*/target/release' -print || true
            exit 1
          fi
          cp "$NLLB_BIN" src-tauri/binaries/nllb-translation-${TARGET_TRIPLET}
          chmod +x src-tauri/binaries/nllb-translation-${TARGET_TRIPLET}

      - name: Download yt-dlp sidecar
        run: |
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o src-tauri/binaries/yt-dlp-${TARGET_TRIPLET}
          chmod +x src-tauri/binaries/yt-dlp-${TARGET_TRIPLET}

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --config src-tauri/tauri.linux.conf.json --target ${TARGET_TRIPLET}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: speakshift-linux-cuda
          path: |
            src-tauri/binaries/**
            src-tauri/target/${{ env.TARGET_TRIPLET }}/release/bundle/**
          if-no-files-found: warn
